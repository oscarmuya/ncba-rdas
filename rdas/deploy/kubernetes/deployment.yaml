apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdas
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: rdas
    app.kubernetes.io/component: api
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app.kubernetes.io/name: rdas
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rdas
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: rdas
          image: ${IMAGE}
          imagePullPolicy: ${IMAGE_PULL_POLICY}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: rdas-config
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "${JAVA_TOOL_OPTIONS}"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              cpu: ${CPU_REQUEST}
              memory: ${MEMORY_REQUEST}
            limits:
              cpu: ${CPU_LIMIT}
              memory: ${MEMORY_LIMIT}
          volumeMounts:
            - name: snapshot
              mountPath: /app/data
      volumes:
        - name: snapshot
          persistentVolumeClaim:
            claimName: rdas-snapshot
