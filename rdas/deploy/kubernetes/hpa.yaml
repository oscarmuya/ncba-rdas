apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rdas
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: rdas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rdas
  minReplicas: ${HPA_MIN_REPLICAS}
  maxReplicas: ${HPA_MAX_REPLICAS}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: ${HPA_CPU_UTILIZATION}
