apiVersion: v1
kind: ConfigMap
metadata:
  name: rdas-config
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: rdas
data:
  SPRING_DOCKER_COMPOSE_ENABLED: "false"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics"
  RDAS_SOAP_ENDPOINT: "${RDAS_SOAP_ENDPOINT}"
  RDAS_SOAP_NAMESPACE_URI: "${RDAS_SOAP_NAMESPACE_URI}"
  RDAS_SOAP_CONNECT_TIMEOUT: "${RDAS_SOAP_CONNECT_TIMEOUT}"
  RDAS_SOAP_READ_TIMEOUT: "${RDAS_SOAP_READ_TIMEOUT}"
  RDAS_CACHE_TTL: "${RDAS_CACHE_TTL}"
  RDAS_CACHE_SNAPSHOT_PATH: "${RDAS_CACHE_SNAPSHOT_PATH}"
  RDAS_CACHE_STALE_THRESHOLD: "${RDAS_CACHE_STALE_THRESHOLD}"
  RDAS_REFRESH_STARTUP_ENABLED: "${RDAS_REFRESH_STARTUP_ENABLED}"
  RDAS_REFRESH_SCHEDULED_ENABLED: "${RDAS_REFRESH_SCHEDULED_ENABLED}"
  RDAS_REFRESH_FIXED_DELAY: "${RDAS_REFRESH_FIXED_DELAY}"
